<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>実験台予約</title>

<style>
body { font-family:sans-serif; margin:20px; }

/* 🔥 これ追加済み（ボタン押せるように） */
ul {
  position: relative;
  z-index: 10;
}

button {
  position: relative;
  z-index: 20;
  cursor: pointer;
}

#timeline {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  height:900px;
  border:1px solid #ccc;
}

.column {
  position:relative;
  border-left:1px solid #ccc;
}

.cell {
  height:calc(100% / 60);
  border-bottom:1px solid #ddd;
}

.hour-line {
  border-bottom:1px solid #999;
}

.time-label {
  position:absolute;
  left:5px;
  font-size:10px;
  transform: translateY(-50%);
}

.block {
  position:absolute;
  left:5%;
  width:90%;
  background:#bcdbf7;
  font-size:11px;
  padding:2px;
  border-radius:4px;
}
</style>
</head>

<body>

<h2>実験台予約</h2>

<button onclick="changeDay(-1)">◀</button>
<span id="date"></span>
<button onclick="changeDay(1)">▶</button>

<br><br>

開始 <input type="time" id="start" step="900">
終了 <input type="time" id="end" step="900">
名前 <input id="name">
<button onclick="add()">追加</button>

<div id="timeline"></div>
<ul id="list"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCqkj_33myR7SlosVQL0BOC7hPItnPWY4s",
  authDomain: "lab-reservation-f7b03.firebaseapp.com",
  projectId: "lab-reservation-f7b03",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let schedules = [];
let currentDate = new Date();

function dateKey(){
  return currentDate.toISOString().split("T")[0];
}

window.changeDay = function(d){
  currentDate.setDate(currentDate.getDate()+d);
  update();
};

function update(){
  document.getElementById("date").textContent =
    currentDate.toLocaleDateString();
  render();
  renderList();
}

window.add = async function(){
  let s=document.getElementById("start").value;
  let e=document.getElementById("end").value;
  let n=document.getElementById("name").value || "名無し";

  if(!s||!e) return;

  await addDoc(collection(db,"schedules"),{
    start:s,
    end:e,
    name:n,
    date:dateKey()
  });
};

onSnapshot(collection(db,"schedules"), snap=>{
  schedules=[];
  snap.forEach(d=>{
    schedules.push({
      id:d.id,
      ...d.data()
    });
  });
  update();
});

function deleteItem(id){
  deleteDoc(doc(db,"schedules",id));
}

function render(){
  const timeline=document.getElementById("timeline");
  timeline.innerHTML="";

  let dayData = schedules.filter(s=>s.date===dateKey());

  for(let c=0;c<3;c++){
    let col=document.createElement("div");
    col.className="column";

    for(let i=0;i<60;i++){
      let cell=document.createElement("div");
      cell.className="cell";

      if(i%4===0){
        cell.classList.add("hour-line");

        let hour=6+(i/4);
        let label=document.createElement("div");
        label.className="time-label";
        label.style.top=(i*(100/60))+"%";
        label.textContent=hour+":00";
        col.appendChild(label);
      }

      col.appendChild(cell);
    }

    timeline.appendChild(col);
  }

  const cols=document.querySelectorAll(".column");
  let colData=[[],[],[]];

  dayData.forEach(d=>{
    for(let i=0;i<3;i++){
      let conflict=colData[i].some(ex=>{
        return !(d.end<=ex.start || d.start>=ex.end);
      });

      if(!conflict){
        colData[i].push(d);

        let col=cols[i];

        let start=toMin(d.start);
        let end=toMin(d.end);

        let top=((start-360)/900)*100;
        let height=((end-start)/900)*100;

        let block=document.createElement("div");
        block.className="block";

        block.style.top=top+"%";
        block.style.height=height+"%";

        block.textContent =
          `${d.start}〜${d.end} ${d.name}`;

        col.appendChild(block);
        break;
      }
    }
  });
}

function renderList(){
  const ul=document.getElementById("list");
  ul.innerHTML="";

  let dayData = schedules.filter(s=>s.date===dateKey());

  dayData.forEach(d=>{
    let li=document.createElement("li");

    li.textContent =
      `${d.start}〜${d.end} ${d.name}`;

    let btn=document.createElement("button");
    btn.textContent="削除";
    btn.onclick=()=>deleteItem(d.id);

    li.appendChild(btn);
    ul.appendChild(li);
  });
}

function toMin(t){
  let [h,m]=t.split(":");
  return h*60 + +m;
}

update();

</script>

</body>
</html>
